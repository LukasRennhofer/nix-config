[colors]
bg = #cc0f111a
bg-alt = #cc1b2130
fg = #d8dee9
blue = #5e81ac
cyan = #88c0d0
blue-dark = #3b4252
inactive = #4c566a
urgent = #bf616a

[bar/top]
width = 100%
height = 30
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
line-color = ${colors.blue}
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.inactive}
font-0 = JetBrainsMono Nerd Font:size=11;2
font-1 = Symbols Nerd Font Mono:size=18;5
modules-left = workspaces
modules-center = date
modules-right = wifi volume cpu memory disk battery
tray-position = right
tray-padding = 2
wm-restack = i3
enable-ipc = true

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = false

label-active = %name%
label-active-background = #d8dee9
label-active-foreground = #0f111a
label-active-padding = 4

label-occupied = %name%
label-occupied-background = #3b4252
label-occupied-foreground = #d8dee9
label-occupied-padding = 2

label-empty = %name%
label-empty-background = #1b2130
label-empty-foreground = #4c566a
label-empty-padding = 2

label-urgent = %name%
label-urgent-background = #bf616a
label-urgent-foreground = #d8dee9
label-urgent-padding = 2

[module/volume]
type = custom/script
exec = pactl get-sink-volume @DEFAULT_SINK@ | head -n1 | awk '{print "󰕾 " $5}'
interval = 2
format = <label>
label = %output%
label-foreground = ${colors.cyan}

[module/cpu]
type = custom/script
exec = top -bn1 | grep "Cpu(s)" | awk '{print "󰍛 " int($2+$4) "%"}'
interval = 3
format = <label>
label = %output%
label-foreground = ${colors.blue}

[module/memory]
type = custom/script
exec = free -h | awk '/Mem:/ {print "󰘚 " $3 "/" $2}'
interval = 5
format = <label>
label = %output%
label-foreground = ${colors.blue}

[module/disk]
type = custom/script
exec = df -h / | awk 'END{print "󰋊 " $3 "/" $2}'
interval = 30
format = <label>
label = %output%
label-foreground = ${colors.cyan}

[module/wifi]
type = custom/script
exec = bash ~/.config/polybar/wifi-menu.sh status
interval = 10
format = <label>
label = %output%
label-foreground = ${colors.cyan}
click-left = bash ~/.config/polybar/wifi-menu.sh connect
click-right = kitty -e nmtui

[module/battery]
type = custom/script
exec = acpi -b | awk -F', ' '{print "󰁹 " $2}'
interval = 30
format = <label>
label = %output%
label-foreground = ${colors.fg}

[module/date]
type = custom/script
exec = date '+󰃰 %a %d %b  󰥔 %H:%M'
interval = 60
format = <label>
label = %output%
label-foreground = ${colors.fg}