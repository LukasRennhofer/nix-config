[colors]
bg = #282828
bg-alt = #3c3836
fg = #ebdbb2
fg-soft = #d5c4a1
fg-dim = #a89984
blue = #83a598
cyan = #689d6a
green = #98971a
blue-dark = #458588
inactive = #7c6f64
urgent = #cc241d
yellow = #d79921
orange = #d65d0e
aqua = #8ec07c
muted = #665c54

[bar/top]
width = 100%
height = 30
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
line-color = #a8835f
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.muted}
font-0 = JetBrainsMono Nerd Font:size=11;2
font-1 = Symbols Nerd Font Mono:size=18;5
modules-left = workspaces
modules-center = date
modules-right = wifi volume cpu memory disk battery
tray-position = right
tray-padding = 2
wm-restack = i3
enable-ipc = true

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = false

label-active = %name%
label-active-background = ${colors.bg}
label-active-foreground = ${colors.yellow}
label-active-padding = 4

label-occupied = %name%
label-occupied-background = ${colors.bg-alt}
label-occupied-foreground = ${colors.fg-soft}
label-occupied-padding = 2

label-empty = %name%
label-empty-background = #665c54
label-empty-foreground = #d5c4a1
label-empty-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.urgent}
label-urgent-foreground = #fbf1c7
label-urgent-padding = 2

[module/volume]
type = custom/script
exec = pactl get-sink-volume @DEFAULT_SINK@ | head -n1 | awk '{print "󰕾 " $5}'
interval = 2
format = <label>
label = %output%
label-foreground = ${colors.yellow}

[module/cpu]
type = custom/script
exec = top -bn1 | grep "Cpu(s)" | awk '{print "󰍛 " int($2+$4) "%"}'
interval = 3
format = <label>
label = %output%
label-foreground = ${colors.green}

[module/memory]
type = custom/script
exec = free -h | awk '/Mem:/ {print "󰘚 " $3 "/" $2}'
interval = 5
format = <label>
label = %output%
label-foreground = ${colors.orange}

[module/disk]
type = custom/script
exec = df -h / | awk 'END{print "󰋊 " $3 "/" $2}'
interval = 30
format = <label>
label = %output%
label-foreground = ${colors.fg-soft}

[module/wifi]
type = custom/script
exec = bash ~/.config/polybar/wifi-menu.sh status
interval = 10
format = <label>
label = %output%
label-foreground = ${colors.aqua}
click-left = bash ~/.config/polybar/wifi-menu.sh connect
click-right = kitty -e nmtui

[module/battery]
type = custom/script
exec = acpi -b | awk -F', ' '{print "󰁹 " $2}'
interval = 30
format = <label>
label = %output%
label-foreground = ${colors.yellow}

[module/date]
type = custom/script
exec = date '+󰃰 %a %d %b  󰥔 %H:%M'
interval = 60
format = <label>
label = %output%
label-foreground = ${colors.fg-soft}