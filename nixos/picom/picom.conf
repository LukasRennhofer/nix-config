backend = "glx";
vsync = true;

shadow = true;
shadow-radius = 10;
shadow-opacity = 0.35;
shadow-offset-x = -8;
shadow-offset-y = -8;

corner-radius = 10;
round-borders = 1;

# Opacity for windows. Lower values = more transparent.
inactive-opacity = 0.88;
active-opacity = 0.92;
frame-opacity = 0.90;

blur-method = "dual_kawase";
blur-strength = 6;

opacity-rule = [
  "100:class_g = 'Polybar'",
  "100:class_g = 'Rofi'",
  "100:class_g = 'dunst'",
  "100:class_g = 'i3lock'",
  "90:class_g = 'kitty'"
];

wintypes:
{
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.96; };
  dropdown_menu = { opacity = 0.96; };
};
